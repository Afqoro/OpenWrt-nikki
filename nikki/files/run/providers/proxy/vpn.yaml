# > Mulai Baris Ini Kebawah Isi Dengan Akun Anda Sendiri
# > Isi Menggunakan Akun VPN dengan Metode Bug Paket Anda, bebas trojan/vmess/vless

- name: TrojanWS
  server: BUG.COM
  port: 443
  type: trojan
  password: UUID/PASSWORD
  skip-cert-verify: true
  sni: HOST.COM
  network: ws
  ws-opts:
    path: /trojan
    headers:
      Host: HOST.COM
  udp: true

- name: VmessWS
  server: BUG.COM
  port: 80
  type: vmess
  uuid: UUID/PASSWORD
  alterId: 0
  cipher: auto
  tls: false
  skip-cert-verify: true
  servername: HOST.COM
  network: ws
  ws-opts:
    path: /mahavpn
    headers:
      Host: HOST.COM
  udp: true