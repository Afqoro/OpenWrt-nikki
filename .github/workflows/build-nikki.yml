name: Build Nikki

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'nikki/**'
      - 'luci-app-nikki/**'
      - '.github/workflows/build-nikki.yml'

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64_generic-openwrt-24.10
          - arch: x86_64-openwrt-24.10

    env:
      PACKAGE_NAME: nikki
      LUCI_PACKAGE_NAME: luci-app-nikki
      TZ: Asia/Jakarta

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Init build log
        run: |
          : > "$RUNNER_TEMP/build.log"
          echo "BUILD_START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"
          echo "[$(date '+%H:%M:%S')] checkout....OK" >> "$RUNNER_TEMP/build.log"

      - name: Read package version
        run: |
          PKG_VERSION=$(sed -n 's/^PKG_VERSION:=//p' luci-app-nikki/Makefile | head -n1 | tr -d '[:space:]')
          if [ -z "$PKG_VERSION" ]; then
            echo "[$(date '+%H:%M:%S')] read ver....FAIL" >> "$RUNNER_TEMP/build.log"
            echo "PKG_VERSION not found in luci-app-nikki/Makefile"
            exit 1
          fi

          echo "PKG_VERSION=$PKG_VERSION" >> "$GITHUB_ENV"
          echo "ARCHIVE_NAME=nikki-${{ matrix.arch }}-$PKG_VERSION.tar.gz" >> "$GITHUB_ENV"

          echo "Using PKG_VERSION=$PKG_VERSION"
          echo "Using ARCHIVE_NAME=nikki-${{ matrix.arch }}-$PKG_VERSION.tar.gz"
          echo "[$(date '+%H:%M:%S')] read ver....OK" >> "$RUNNER_TEMP/build.log"

      - name: Build packages with OpenWrt SDK
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}
          FEEDNAME: nikki
          PACKAGES: nikki luci-app-nikki
          NO_REFRESH_CHECK: true

      - name: Debug built packages
        run: |
          echo "== Packages under bin =="
          find bin -type f -name '*.ipk' | sort
    
      - name: Mark build success
        run: |
          echo "[$(date '+%H:%M:%S')] build.......OK" >> "$RUNNER_TEMP/build.log"

      - name: Collect IPK files
        run: |
          mkdir -p "artifacts/${{ matrix.arch }}"

          if find bin -type f \( \
            -name 'nikki_*.ipk' -o \
            -name 'luci-app-nikki_*.ipk' -o \
            -name 'luci-i18n-nikki-*.ipk' -o \
            -name 'mihomo-meta_*.ipk' -o \
            -name 'mihomo-alpha_*.ipk' -o \
            -name 'mihomo_*.ipk' \
          \) -exec cp -v {} "artifacts/${{ matrix.arch }}/" \;; then
            ls -lh "artifacts/${{ matrix.arch }}/"
            echo "[$(date '+%H:%M:%S')] collect.....OK" >> "$RUNNER_TEMP/build.log"
          else
             echo "[$(date '+%H:%M:%S')] collect.....FAIL" >> "$RUNNER_TEMP/build.log"
            exit 1
          fi

      - name: Verify collected packages
        run: |
          echo "Collected files:"
          find "artifacts/${{ matrix.arch }}" -maxdepth 1 -type f -printf '%f\n' | sort

      - name: Create tar.gz like upstream
        run: |
          if tar -czf "$ARCHIVE_NAME" -C "artifacts/${{ matrix.arch }}" .; then
            ls -lh "$ARCHIVE_NAME"
            echo "[$(date '+%H:%M:%S')] archive.....OK" >> "$RUNNER_TEMP/build.log"
          else
            echo "[$(date '+%H:%M:%S')] archive.....FAIL" >> "$RUNNER_TEMP/build.log"
            exit 1
          fi

      - name: Generate SHA256
        run: |
          if sha256sum "$ARCHIVE_NAME" | awk '{print $1}' > sha256.txt; then
            echo "SHA256=$(cat sha256.txt)" >> "$GITHUB_ENV"
            cat sha256.txt
            echo "[$(date '+%H:%M:%S')] sha256......OK" >> "$RUNNER_TEMP/build.log"
          else
            echo "[$(date '+%H:%M:%S')] sha256......FAIL" >> "$RUNNER_TEMP/build.log"
            exit 1
          fi

      - name: Upload file to API endpoint
        env:
          UPLOAD_URL: ${{ secrets.UPLOAD_URL }}
          UPLOAD_API_KEY: ${{ secrets.UPLOAD_API_KEY }}
        run: |
          echo "[$(date '+%H:%M:%S')] upload......OK" >> "$RUNNER_TEMP/build.log"
          LOG_BODY="$(cat "$RUNNER_TEMP/build.log")"

          BUILD_END_EPOCH="$(date +%s)"
          BUILD_DURATION_SEC="$((BUILD_END_EPOCH - BUILD_START_EPOCH))"
          BUILD_DURATION_FMT="$(printf '%02d:%02d:%02d' \
            $((BUILD_DURATION_SEC / 3600)) \
            $(((BUILD_DURATION_SEC % 3600) / 60)) \
            $((BUILD_DURATION_SEC % 60)))"

          CAPTION="$(cat <<EOF
          <b>Nikki build uploaded</b>
          <b>Mod by:</b> MahaVPN

          <b>● File:</b> $PACKAGE_NAME
          <b>● Version:</b> $PKG_VERSION
          <b>● Arch:</b> ${{ matrix.arch }}

          <b>● Archive:</b> <code>$(basename "$ARCHIVE_NAME")</code>

          <b>Build log</b>
          <pre>${LOG_BODY}</pre>

          <b>Build finished in:</b> ${BUILD_DURATION_FMT}
          EOF
          )"

          RESPONSE="$(
            curl --fail --show-error --silent \
              -X POST "$UPLOAD_URL" \
              -H "Authorization: Bearer $UPLOAD_API_KEY" \
              -F "file=@$ARCHIVE_NAME" \
              -F "category=ipk_mod_private" \
              -F "subfolder=${{ matrix.arch }}" \
              -F "repository=${{ github.repository }}" \
              -F "sha256=${SHA256}" \
              -F "notify_telegram=1" \
              -F "telegram_conf_path=${{ secrets.TELEGRAM_CONF_PATH }}" \
              -F "pkg_name=nikki" \
              -F "pkg_version=${PKG_VERSION}" \
              -F "arch=${{ matrix.arch }}" \
              -F "mod_name=MahaVPN" \
              --form-string "caption=$CAPTION"
          )"

          python3 - <<'PY' "$RESPONSE"
          import json, sys
          data = json.loads(sys.argv[1])
          print(f"{data.get('success')} - {data.get('message')}")
          if data.get("data"):
              import json as _json
              print(_json.dumps(data["data"], indent=2))
          PY

      - name: Done
        run: |
          echo "[$(date '+%H:%M:%S')] success.....OK" >> "$RUNNER_TEMP/build.log"
          echo "Build uploaded successfully"