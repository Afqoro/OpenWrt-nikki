name: Build Nikki

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'nikki/**'
      - 'luci-app-nikki/**'
      - '.github/workflows/build-nikki.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_generic-openwrt-24.10
          # - x86_64-openwrt-24.10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build packages
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}
          FEEDNAME: nikki
          PACKAGES: nikki luci-app-nikki
          NO_REFRESH_CHECK: true

      - name: Collect IPK files
        run: |
          mkdir -p artifacts/${{ matrix.arch }}
          find bin -name '*nikki*.ipk' -exec cp -v {} artifacts/${{ matrix.arch }}/ \;
          ls -lh artifacts/${{ matrix.arch }}/

      - name: Create tar.gz like upstream
        run: |
          tar -czf nikki-${{ matrix.arch }}.tar.gz -C artifacts/${{ matrix.arch }} .
          ls -lh nikki-${{ matrix.arch }}.tar.gz

      - name: Generate SHA256
        run: |
          sha256sum nikki-${{ matrix.arch }}.tar.gz | awk '{print $1}' > sha256.txt
          echo "SHA256=$(cat sha256.txt)" >> $GITHUB_ENV
          cat sha256.txt

      - name: Upload build to FastAPI endpoint
        env:
          UPLOAD_URL: ${{ secrets.UPLOAD_URL }}
          UPLOAD_API_KEY: ${{ secrets.UPLOAD_API_KEY }}
        run: |
          curl --fail --show-error --silent \
            -X POST "$UPLOAD_URL" \
            -H "Authorization: Bearer $UPLOAD_API_KEY" \
            -F "file=@nikki-${{ matrix.arch }}.tar.gz" \
            -F "arch=${{ matrix.arch }}" \
            -F "target=nikki" \
            -F "repository=${{ github.repository }}" \
            -F "run_id=${{ github.run_id }}-${{ matrix.arch }}" \
            -F "sha256=${SHA256}"

      - name: Done
        run: echo "Build uploaded successfully"