name: cleanup-build-nikki-runs

on:
  schedule:
    - cron: "20 2 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup old Build Nikki workflow runs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow_id = "build-nikki.yml";

            async function getAllCompletedRuns() {
              const runs = await github.paginate(
                github.rest.actions.listWorkflowRuns,
                {
                  owner,
                  repo,
                  workflow_id,
                  status: "completed",
                  per_page: 100
                }
              );

              return runs
                .filter(run => !["in_progress", "queued", "requested", "waiting", "pending"].includes(run.status))
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            }

            function splitRuns(runs) {
              return {
                success: runs.filter(run => run.conclusion === "success"),
                failure: runs.filter(run => ["failure", "timed_out", "cancelled", "startup_failure", "stale", "action_required"].includes(run.conclusion))
              };
            }

            async function deleteOlderRuns(runs, keepCount, label) {
              const toDelete = runs.slice(keepCount);

              core.info(`${label}: total=${runs.length}, keep=${keepCount}, delete=${toDelete.length}`);

              for (const run of toDelete) {
                core.info(`Deleting ${label} run #${run.run_number} | id=${run.id} | conclusion=${run.conclusion} | created_at=${run.created_at}`);
                await github.rest.actions.deleteWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id
                });
              }
            }

            const allRuns = await getAllCompletedRuns();
            const { success, failure } = splitRuns(allRuns);

            await deleteOlderRuns(success, 5, "success");
            await deleteOlderRuns(failure, 10, "failure");

            core.info("Cleanup completed.");